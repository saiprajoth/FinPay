services:
  postgres:
    image: postgres:16-alpine
    container_name: finpay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finpay_db
    ports:
      - "5432:5432"
    volumes:
      - finpay_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: finpay-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    command: sh -c "cd /app/packages/db && npx prisma migrate deploy && cd /app/apps/backend && node dist/index.js"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: finpay-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  finpay_pg_data: